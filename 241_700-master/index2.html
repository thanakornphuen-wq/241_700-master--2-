<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝Form register📝</title>
    <style>
        body{
            @font-face {
                font-family: 'Kanit';
                src: url('./Kanit/Kanit-Regular.ttf') format('truetype');
            }
            background-color: lightblue;
            font-family:'Kanit';
        }
        h1 {
            color: white;
            text-align: center;
        }
        #regis {
            font-size: 40px;
            color: purple;
        }
        .input_name{
            background-color: pink;
            border: 2px solid cyan;
        }
    </style>
</head>
<body>
    <h1 id="regis">Register</h1>
    ชื่อ : <input class="input_name" type="text" name="fname"> <br>
    นามสกุล : <input type="text" name="lname"> <br>
    เพศ : 
    <input type="radio" name="gender" value="male"> ชาย
    <input type="radio" name="gender" value="female"> หญิง
    <br>
    อายุ <input type="text" name="age" min="0" max="120"> <br>
    งานอดิเรก : 
    <input type="checkbox" name="hobby" value="football"> ฟุตบอล
    <input type="checkbox" name="hobby" value="Basketball"> บาสเก็ตบอล
    <input type="checkbox" name="hobby" value="Reading"> อ่านหนังสือ
    <br>
    รายละเอียดเพิ่มเติม <br>
    <textarea name="details" rows="5" cols="30"></textarea> <br>
    <input type="submit" value="Submit">
</body>
</html>
